name: Build Docker

on:
  push:
    branches:
      - main

permissions:
  packages: write
  contents: read

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # 1. ПЕРЕВОДИМ ИМЯ ВЛАДЕЛЬЦА В НИЖНИЙ РЕГИСТР
      - name: Lowercase repository owner
        id: repo-owner
        run: echo "repo_owner=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_OUTPUT  

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}  

      - name: Build and Push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          # tags: ghcr.io/${{ github.repository_owner }}/embedded-dev:latest
          # 2. ИСПОЛЬЗУЕМ ПОДГОТОВЛЕННУЮ ПЕРЕМЕННУЮ ВМЕСТО github.repository_owner
          tags: ghcr.io/${{ steps.repo-owner.outputs.repo_owner }}/embedded-dev:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max