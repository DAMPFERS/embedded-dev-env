name: Build Docker

on:
  push:
    branches:
      - main

permissions:
  packages: write
  contents: read

jobs:

  docker:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - name: Login GHCR

        uses: docker/login-action@v3

        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}  

      - name: Build and Push

        uses: docker/build-push-action@v6

        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/embedded-dev:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max